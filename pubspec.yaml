name: watch_and_earn_pro
description: A futuristic watch-to-earn application with cyberpunk design
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: 2.32.0
  firebase_auth: 4.20.0
  cloud_firestore: ^4.17.5

  # Google Sign In
  google_sign_in: ^6.2.2

  # Google Mobile Ads
  google_mobile_ads: ^5.1.0

  # UI
  google_fonts: 6.1.0

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.19.0
  shared_preferences: 2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

assets:
  - assets/images/logo.png
